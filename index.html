<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Slick's Salvage & Mining Operation Training Module</title>
    <style>
      @font-face {
        font-family: 'FreePixel';
        src: url('/fonts/FreePixel.ttf') format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'pixel_lcd';
        src: url('/fonts/pixel_lcd_7.ttf') format('truetype');
        font-display: swap;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #020806;
        background-image:
          radial-gradient(circle at 20% 30%, rgba(170, 255, 220, 0.9) 0 1px, transparent 1.5px),
          radial-gradient(circle at 70% 20%, rgba(255, 255, 255, 0.9) 0 1px, transparent 1.6px),
          radial-gradient(circle at 40% 75%, rgba(120, 255, 210, 0.65) 0 1px, transparent 1.4px),
          radial-gradient(circle at 85% 65%, rgba(255, 255, 255, 0.7) 0 1px, transparent 1.5px),
          linear-gradient(180deg, #04110d 0%, #020806 100%);
        background-size: 220px 220px, 260px 260px, 300px 300px, 340px 340px, 100% 100%;
        background-position: 0 0, 40px 30px, 120px 80px, 180px 140px, 0 0;
        overscroll-behavior: none;
        touch-action: none;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      #company-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: transparent;
        transition: opacity 350ms ease-out;
        pointer-events: none;
      }
      #company-splash img {
        max-width: 80vw;
        max-height: 80vh;
        image-rendering: pixelated;
      }
      #company-splash.hidden {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="company-splash"><img alt="" /></div>
    <script>
      (function () {
        var DURATION_MS = 2500;
        var FADE_MS = 350;
        var SPLASH_SRC = '';
        var splash = document.getElementById('company-splash');
        if (!splash) return;
        var img = splash.querySelector('img');
        if (SPLASH_SRC && img) {
          img.src = SPLASH_SRC + (SPLASH_SRC.indexOf('?') === -1 ? '?t=' : '&t=') + Date.now();
        } else {
          splash.parentNode && splash.parentNode.removeChild(splash);
          return;
        }
        setTimeout(function () {
          splash.classList.add('hidden');
          setTimeout(function () {
            splash.parentNode && splash.parentNode.removeChild(splash);
          }, FADE_MS);
        }, DURATION_MS);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
